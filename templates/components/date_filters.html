<div class="date-filters">
    <div class="filter-section">
        <!-- Date Range Picker -->
        <div class="filter-group">
            <button class="filter-toggle {% if start_date %}filter-active{% endif %}" onclick="toggleFilter('dateFilter')">
                📅 Date Range
                {% if start_date %}
                    <span class="filter-value-preview">{{ start_date }} → {{ end_date }}</span>
                {% endif %}
                <span class="toggle-arrow">▾</span>
            </button>
            <div class="filter-dropdown" id="dateFilter">
                <form method="GET" class="filter-form">
                    <input type="hidden" name="range" value="{{ current_range }}">
                    <div class="filter-row">
                        <div class="filter-field">
                            <label>From Date</label>
                            <input type="date" name="start" value="{{ start_date }}" min="{{ min_date }}" max="{{ max_date }}" class="filter-input">
                        </div>
                        <span class="filter-arrow">→</span>
                        <div class="filter-field">
                            <label>To Date</label>
                            <input type="date" name="end" value="{{ end_date }}" min="{{ min_date }}" max="{{ max_date }}" class="filter-input">
                        </div>
                    </div>
                    <div class="filter-actions">
                        <button type="submit" class="filter-apply">Apply</button>
                        <a href="?range={{ current_range }}" class="filter-clear">Clear</a>
                    </div>
                    <div class="quick-ranges">
                        <span class="quick-label">Quick:</span>
                        <button type="button" class="quick-btn" onclick="setQuickDate(7)">Last 7 days</button>
                        <button type="button" class="quick-btn" onclick="setQuickDate(14)">Last 14 days</button>
                        <button type="button" class="quick-btn" onclick="setQuickDate(30)">Last 30 days</button>
                        <button type="button" class="quick-btn" onclick="setQuickDate(90)">Last 90 days</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Month Range Picker -->
        <div class="filter-group">
            <button class="filter-toggle {% if start_month %}filter-active{% endif %}" onclick="toggleFilter('monthFilter')">
                🗓️ Month Range
                {% if start_month %}
                    <span class="filter-value-preview">{{ start_month }} → {{ end_month }}</span>
                {% endif %}
                <span class="toggle-arrow">▾</span>
            </button>
            <div class="filter-dropdown" id="monthFilter">
                <form method="GET" class="filter-form">
                    <input type="hidden" name="range" value="{{ current_range }}">
                    <div class="filter-row">
                        <div class="filter-field">
                            <label>From Month</label>
                            <input type="month" name="start_month" value="{{ start_month }}" min="{{ min_month }}" max="{{ max_month }}" class="filter-input">
                        </div>
                        <span class="filter-arrow">→</span>
                        <div class="filter-field">
                            <label>To Month</label>
                            <input type="month" name="end_month" value="{{ end_month }}" min="{{ min_month }}" max="{{ max_month }}" class="filter-input">
                        </div>
                    </div>
                    <div class="filter-actions">
                        <button type="submit" class="filter-apply">Apply</button>
                        <a href="?range={{ current_range }}" class="filter-clear">Clear</a>
                    </div>
                    <div class="quick-ranges">
                        <span class="quick-label">Quick:</span>
                        <button type="button" class="quick-btn" onclick="setQuickMonth(3)">Last 3 months</button>
                        <button type="button" class="quick-btn" onclick="setQuickMonth(6)">Last 6 months</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Active Filter Badge -->
    {% if start_date or start_month %}
    <div class="active-filter-badge">
        <span class="filter-badge-icon">🔍</span>
        <span>Showing: <strong>{{ date_from }}</strong> → <strong>{{ date_to }}</strong></span>
        <a href="?range={{ current_range }}" class="clear-all-btn">✕ Clear</a>
    </div>
    {% endif %}
</div>

<script>
let openFilter = null;

function toggleFilter(id) {
    const el = document.getElementById(id);
    const allDropdowns = document.querySelectorAll('.filter-dropdown');

    allDropdowns.forEach(d => {
        if (d.id !== id) {
            d.classList.remove('show');
        }
    });

    el.classList.toggle('show');
    openFilter = el.classList.contains('show') ? id : null;
}

// Close dropdowns when clicking outside
document.addEventListener('click', function(e) {
    if (!e.target.closest('.filter-group')) {
        document.querySelectorAll('.filter-dropdown').forEach(d => d.classList.remove('show'));
    }
});

function setQuickDate(days) {
    const form = document.querySelector('#dateFilter form');
    const end = new Date('{{ max_date }}');
    const start = new Date(end);
    start.setDate(start.getDate() - days);

    form.querySelector('[name="start"]').value = start.toISOString().split('T')[0];
    form.querySelector('[name="end"]').value = end.toISOString().split('T')[0];
    form.submit();
}

function setQuickMonth(months) {
    const form = document.querySelector('#monthFilter form');
    const endDate = new Date('{{ max_date }}');
    const startDate = new Date(endDate);
    startDate.setMonth(startDate.getMonth() - months + 1);

    const endMonth = endDate.toISOString().slice(0, 7);
    const startMonth = startDate.toISOString().slice(0, 7);

    form.querySelector('[name="start_month"]').value = startMonth;
    form.querySelector('[name="end_month"]').value = endMonth;
    form.submit();
}
</script>
