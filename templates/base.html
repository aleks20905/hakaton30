<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curtis</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="sidebar-header">
        <div class="logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" 
                 style="width:100%; height:auto; object-fit:contain;">
        </div>
    </div>
    
    <nav class="sidebar-nav">
        <a href="/?{{ filter_query }}" class="nav-item {{ 'active' if page == 'dashboard' }}">
            <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="/records?{{ filter_query }}" class="nav-item {{ 'active' if page == 'records' }}">
            <span class="nav-icon">📋</span> Records
        </a>
        <a href="/analytics?{{ filter_query }}" class="nav-item {{ 'active' if page == 'analytics' }}">
            <span class="nav-icon">📈</span> Analytics
        </a>
    </nav>

</aside>

<!-- MAIN -->
<main class="main-content">
    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="top-bar-left">
            <h1 class="page-title">{% block title %}Dashboard{% endblock %}</h1>
            <p class="page-subtitle">{% block subtitle %}Overview{% endblock %}</p>
        </div>
        <div class="top-bar-right">
            {% include "components/range_selector.html" %}
        </div>
    </div>

    <!-- FILTERS BAR -->
    <div class="filters-bar">
        {% include "components/filters.html" %}
    </div>

    <!-- CONTENT -->
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</main>

{% block scripts %}{% endblock %}
</body>
</html>
