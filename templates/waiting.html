<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="10">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting for data...</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; background: #0f172a; color: #e2e8f0;
            font-family: sans-serif; flex-direction: column; gap: 1rem; text-align: center;
            padding: 2rem;
        }
        i { font-size: 3rem; color: #f59e0b; }
        h1 { font-size: 1.5rem; margin: 0; }
        p { color: #94a3b8; margin: 0; max-width: 500px; }
        .upload-btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.75rem 1.5rem; background: #3b82f6; color: white;
            border-radius: 8px; cursor: pointer; margin-top: 1rem;
            font-weight: 600; border: none;
        }
        .upload-btn:hover { background: #2563eb; }
        code {
            background: rgba(255,255,255,0.1); padding: 2px 8px;
            border-radius: 4px; font-size: 0.9em;
        }
    </style>
</head>
<body>
    <i class="bi bi-hourglass-split"></i>
    <h1>Waiting for data file</h1>
    <p>No <code>Unified_Production_Analytics.xlsx</code> found in the data folder.</p>
    <p>Upload the file generated by <code>script.py</code> to get started.</p>

    <form action="/upload" method="POST" enctype="multipart/form-data">
        <label class="upload-btn">
            <i class="bi bi-upload"></i>
            Upload Data File
            <input type="file" name="file" accept=".xlsx" hidden onchange="this.form.submit()">
        </label>
    </form>

    <p style="font-size:0.8rem; margin-top:2rem;">Page refreshes automatically every 10 seconds.</p>
</body>
</html>
